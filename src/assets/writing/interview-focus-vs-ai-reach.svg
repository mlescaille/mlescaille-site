<svg width="680" height="290" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img">
<title>What the interview should test vs where AI helps</title>
<desc>Three stages from ambiguity to code. A band shows the interview should test the first two stages, defining the problem and drawing boundaries, while AI already helps most in the later stages.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="290" fill="#FFFFFF"/>

<rect x="40" y="60" width="180" height="44" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1"/>
<text x="130" y="82" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Define the problem</text>

<rect x="250" y="60" width="180" height="44" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1"/>
<text x="340" y="82" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Draw the boundaries</text>

<rect x="460" y="60" width="180" height="44" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="1"/>
<text x="550" y="82" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Write the code</text>

<line x1="220" y1="82" x2="248" y2="82" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="82" x2="458" y2="82" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="150" width="390" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="235" y="170" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">What the interview should test</text>

<rect x="350" y="210" width="290" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="495" y="230" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#444441">Where AI already helps</text>
</svg>
