name: Notify on scheduled post publish

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      window_minutes:
        description: 'Publish window in minutes (widen to re-notify older posts when testing)'
        required: false
        default: '20'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check for posts due to publish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          WINDOW_MINUTES: ${{ github.event.inputs.window_minutes }}
        run: node scripts/notify-scheduled-posts.mjs
